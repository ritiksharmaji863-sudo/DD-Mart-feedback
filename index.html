<!DOCTYPE html>
<html>
<head>
	<title> DD Mart Feedback</title>

	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,
	initial-scale=1.0">
	<style>
		body {
			margin-top: 80px;
		}
		h2{
			color: #198754;
			text-align: center;
			font-size: 28px;
		}
		p{
			text-align: center
			color: #555;
			}
		body {
			Font-family: Arial, sans-serif;
			background: linear-gradient(to right,#4e73df, #1cc88a);
			margin: 0;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
		}
		.container {
			Background: White;
			padding: 30px;
			border-radius: 10px;
			width: 400px;
			box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
		}

		h1 {
			text-align: center;
		}

		textarea {
			width: 100%;
			padding: 8px;
			margin-top: 5px;
			border-radius: 5px;
		}

		button {
			width: 100%;
			padding: 10px;
			background: #4e73df;
			color: white;
			border: one;
			border-radius: 5px;
			margin-top: 10px;
			cursor: pointer;

		}

		button:hover {
			background: #2e59d9;
		}

		#thankYouMessege {
			color: green;
			text-align: center;
			display: one;
			margin-top: 10px;
			font-weight: bold;
		}
	</style>
</head>

<body>
	<div class="container">
	<h1>DD MART - Customer Feedback</h1>
		<h2><strong></strong>Welcome to Discount Depo Mart</strong></h2>
	<p>Your feedback is important to us. Please 
	fill the form below.</p>

	<form id="feedbackForm">
		<label><b>Rating:</b></label><br><br>
		<input type="radio" name="rating">
		⭐1<br>

		<input type="radio" name="rating">
		⭐⭐2<br>
		<input type="radio" name="rating">
		⭐⭐⭐3<br>
		<input type="radio" name="rating">
		⭐⭐⭐⭐4<br>
		<input type="radio" name="rating">
		⭐⭐⭐⭐⭐5<br><br>
		<label>1. How was the overall service quality?</label><br>
		<input type="radio" name="service" value="Excellent"> Excellent
		<input type="radio" name="service" value="Good"> Good
		<input type="radio" name="service" value="Average"> Average
		<input type="radio" name="service" value="Poor"> Poor
		<br><br>

		<label>2. How was the staff behavior?</label><br>
		<input type="radio" name="staff" value="Very Polite"> Very Polite
		<input type="radio" name="staff" value="Polite"> Polite
		<input type="radio" name="staff" value="Normal"> Normal
		<input type="radio" name="staff" value="Rude"> Rude 
		<br><br>

		<label>3. Was the billing process smooth?</label><br>
		<input type="radio" name="billing" value="Yes"> Yes
		<input type="radio" name="billing" value="No"> No
		<br><br>

		<label>4. Would you visit again?</label><br>
		<input type="radio" name="Visit" value="Yes"> Yes
		<input type="radio" name="Visit" value="Maybe"> Maybe
		<input type="radio" name="Visit" value="No"> No
		<br><br>


		<label>comment:</b></label><br>
		<textarea name="comment" cols="35" 
		rows="4" 
			placeholder="Write your comment
			 here.."></textarea>
			-
			<br><br>

			<label><b>suggestion:</b></label><br>
			<textarea name="suggestion" cols="35"
			rows="4"
			placeholder="write your suggestion 
			here.."></textarea>

			<br><br>

			
			<button type="submit">Submit</button>
	</form id= "feedbackForm">

	<p id="successMessage" style="color: green; display: none; font-weight: bold;">
  Feedback Saved Successfully ✅
</p>

</div>

<script>document.getElementById("feedbackForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const data = {
        rating: document.querySelector('input[name="rating"]:checked')?.value || "",
        service: document.querySelector('input[name="service"]:checked')?.value || "",
        staff: document.querySelector('input[name="staff"]:checked')?.value || "",
        billing: document.querySelector('input[name="billing"]:checked')?.value || "",
        visit: document.querySelector('input[name="visit"]:checked')?.value || "",
        comment: document.querySelector('textarea[name="comment"]')?.value || "",
        suggestion: document.querySelector('textarea[name="suggestion"]')?.value || ""
    };

    fetch("https://script.google.com/macros/s/AKfycby3uZy9xl3mDYXZHxhfq0UodEBaTv6ROrYRdgP44MzU_juFvhEa7-sQO5CnvmKzsECyEA/exec", {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(res => res.text())
    .then(response => {
        document.getElementById("successMessage").style.display = "block";
        document.getElementById("feedbackForm").reset();
    })
    .catch(error => console.error("Error:", error));
});

	
</script>

</body>

</html>
